<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Race Fast PRO</title>
<style>
body { font-family: Arial; padding: 15px; }
button { padding: 10px 14px; margin: 5px; font-size: 16px; }
table { border-collapse: collapse; width: 100%; margin-top: 15px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 120px; font-size:18px; padding:5px; }
.highlight { background-color: #c8f7c5; }
</style>
</head>
<body>

<h2>🏃 Race Fast PRO (1–150)</h2>

<button onclick="startVoice()">🎤 Ierakstīt skaņu</button>
<button onclick="finishProject()">📥 Eksportēt</button>

<br><br>

<input id="manual" placeholder="Nr" autofocus>
<button onclick="manualAdd()">➕</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Dz. gads</th>
<th>Apļi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let data = {};
let lastRow = null;

// INIT
for (let i = 1; i <= 150; i++) {
  data[i] = { name:"", surname:"", year:"", laps:0 };
}

// RENDER (vienreiz)
function render() {
  let t = document.getElementById("table");
  t.innerHTML = "";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];

    t.innerHTML += `
    <tr id="row-${i}">
      <td>${i}</td>
      <td><input value="${r.name}" onchange="data[${i}].name=this.value"></td>
      <td><input value="${r.surname}" onchange="data[${i}].surname=this.value"></td>
      <td><input value="${r.year}" onchange="data[${i}].year=this.value"></td>
      <td id="laps-${i}">0</td>
    </tr>`;
  }
}

// 🔊 BEEP
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.05);
}

// ➕ PIEVIENO APLI (ātri)
function addLap(num) {
  if (!num) return;

  num = num.toString().replace(/\D/g,"");

  if (!data[num]) {
    document.getElementById("status").innerText = "❌ Nav: " + num;
    return;
  }

  data[num].laps++;

  // update tikai vienu šūnu (SUPER ātri)
  document.getElementById("laps-" + num).innerText = data[num].laps;

  // highlight
  if (lastRow) lastRow.classList.remove("highlight");
  let row = document.getElementById("row-" + num);
  row.classList.add("highlight");
  lastRow = row;

  document.getElementById("status").innerText = "✔ " + num;

  beep();
}

// ⌨️ MANUĀLA SUPER ĀTRA
function manualAdd() {
  let input = document.getElementById("manual");
  addLap(input.value);

  input.value = ""; // 🔥 iztīra uzreiz
  input.focus();    // 🔥 fokus paliek
}

// ENTER = +1 aplis
document.getElementById("manual").addEventListener("keydown", function(e){
  if (e.key === "Enter") {
    manualAdd();
  }
});

// 🎤 BALSS (loop)
function startVoice() {
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  rec.lang = "lv-LV";
  rec.start();

  document.getElementById("status").innerText = "🎤 Klausos...";

  rec.onresult = function(e) {
    let text = e.results[0][0].transcript.toLowerCase();
    let num = text.replace(/\D/g,"");

    addLap(num);

    setTimeout(startVoice, 200);
  };

  rec.onerror = function() {
    setTimeout(startVoice, 800);
  };
}

// 📥 EXPORT
function finishProject() {
  let csv = "Nr,Vards,Uzvards,DzGads,Apli\n";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];
    csv += `${i},${r.name},${r.surname},${r.year},${r.laps}\n`;
  }

  let blob = new Blob([csv], {type: "text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "rezultati.csv";
  a.click();
}

render();

</script>

</body>
</html>
