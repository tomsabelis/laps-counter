<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laps Counter PRO</title>
<style>
body { font-family: Arial; padding: 20px; }
button { padding: 10px; margin: 5px; font-size: 16px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
</style>
</head>
<body>

<h2>🏃 Laps Counter PRO</h2>

<button onclick="startVoice()">🎤 Runāt</button>
<button onclick="exportCSV()">📥 Eksportēt</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Numurs</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Apļi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// DALĪBNIEKI (šeit ieliec visus līdz 150)
let runners = {
  1: ["Jānis", "Bērziņš", 0],
  2: ["Anna", "Kalniņa", 0],
  23: ["Pēteris", "Ozols", 0]
};

let history = [];

function render() {
  let t = document.getElementById("table");
  t.innerHTML = "";

  for (let num in runners) {
    let r = runners[num];
    t.innerHTML += `<tr>
      <td>${num}</td>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
    </tr>`;
  }
}

function addLap(num) {
  num = num.toString().replace(/\D/g,"");

  if (!runners[num]) {
    document.getElementById("status").innerText = "Nav atrasts: " + num;
    return;
  }

  history.push(JSON.stringify(runners));

  runners[num][2]++;

  render();
  document.getElementById("status").innerText = "Pievienots: " + num;
}

// BALSS
function startVoice() {
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  rec.lang = "lv-LV"; // latviešu
  rec.start();

  document.getElementById("status").innerText = "Klausos...";

  rec.onresult = function(e) {
    let text = e.results[0][0].transcript.toLowerCase();

    let num = text.replace(/\D/g,""); // paņem ciparus

    addLap(num);

    startVoice();
  };
}

// EXPORT
function exportCSV() {
  let csv = "Numurs,Vards,Uzvards,Apli\n";

  for (let num in runners) {
    let r = runners[num];
    csv += `${num},${r[0]},${r[1]},${r[2]}\n`;
  }

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "rezultati.csv";
  a.click();
}

render();

</script>

</body>
</html>
