<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">

<title>Race PRO</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; padding: 10px; }
button { padding: 8px 12px; margin: 4px; }
input { width: 90px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 4px; text-align: center; }
.highlight { background: #c8f7c5; }
</style>
</head>

<body>

<h2>🏃 Race PRO (Offline)</h2>

<h3 id="timer">00:00</h3>

<button onclick="startRace()">▶️ Start</button>
<button onclick="pauseRace()">⏸</button>
<button onclick="stopRace()">🛑</button>
<button onclick="exportCSV()">📥 Eksports</button>

<br><br>

<input id="num" placeholder="Nr" autofocus>
<button onclick="manualAdd()">➕</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Dzimums</th>
<th>Dz.g.</th>
<th>Kategorija</th>
<th>Apļi</th>
<th>Pēdējais laiks</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ================= TIMER =================
let startTime = localStorage.getItem("startTime");
let running = localStorage.getItem("running") === "true";

function updateTimer(){
  if(!startTime) return;

  let diff = Math.floor((Date.now() - startTime)/1000);
  let m = String(Math.floor(diff/60)).padStart(2,'0');
  let s = String(diff%60).padStart(2,'0');

  document.getElementById("timer").innerText = m+":"+s;
}
setInterval(updateTimer,1000);

function startRace(){
  if(!startTime) startTime = Date.now();
  running = true;
  save();
}
function pauseRace(){ running=false; save(); }
function stopRace(){ running=false; startTime=null; save(); }

// ================= CATEGORY =================
function getCategory(year){
  year = parseInt(year);

  if(year >= 2015) return "U10";
  if(year >= 2009) return "U16";
  if(year >= 1983) return "Adults";
  if(year <= 1980) return "Seniors";
  return "";
}

// ================= DATA =================
let state = JSON.parse(localStorage.getItem("raceData")) || {};

if(Object.keys(state).length === 0){
  for(let i=1;i<=150;i++){
    state[i]={
      name:"",
      surname:"",
      gender:"",
      year:"",
      laps:0,
      times:[]
    };
  }
}

function save(){
  localStorage.setItem("raceData",JSON.stringify(state));
  localStorage.setItem("startTime",startTime);
  localStorage.setItem("running",running);
}

// ================= RENDER =================
function render(){
  let t=document.getElementById("table");
  t.innerHTML="";

  for(let i=1;i<=150;i++){
    let r=state[i];

    let cat=getCategory(r.year);
    let last=r.times.length ? r.times[r.times.length-1] : "";

    t.innerHTML+=`
    <tr id="row-${i}">
      <td>${i}</td>

      <td><input value="${r.name}" onchange="state[${i}].name=this.value;save()"></td>
      <td><input value="${r.surname}" onchange="state[${i}].surname=this.value;save()"></td>

      <td>
        <select onchange="state[${i}].gender=this.value;save()">
          <option value="">-</option>
          <option value="V" ${r.gender=="V"?"selected":""}>V</option>
          <option value="S" ${r.gender=="S"?"selected":""}>S</option>
        </select>
      </td>

      <td><input value="${r.year}" onchange="state[${i}].year=this.value;save()"></td>

      <td>${cat}</td>

      <td id="laps-${i}">${r.laps}</td>
      <td>${last}</td>
    </tr>`;
  }
}

// ================= ADD LAP =================
function addLap(num){
  if(!running) return;

  num=num.replace(/\D/g,"");
  if(!state[num]) return;

  let t=((Date.now()-startTime)/1000).toFixed(1);

  state[num].laps++;
  state[num].times.push(t);

  document.getElementById("laps-"+num).innerText=state[num].laps;

  save();
}

// ================= MANUAL INPUT =================
function manualAdd(){
  let i=document.getElementById("num");
  addLap(i.value);
  i.value="";
  i.focus();
}

document.getElementById("num").addEventListener("keydown",e=>{
  if(e.key==="Enter") manualAdd();
});

// ================= EXPORT =================
function exportCSV(){
  let csv="Nr,Vards,Uzvards,Dzimums,DzGads,Kategorija,Apli,Laiki\n";

  for(let i=1;i<=150;i++){
    let r=state[i];
    csv+=`${i},${r.name},${r.surname},${r.gender},${r.year},${getCategory(r.year)},${r.laps},"${r.times.join('|')}"\n`;
  }

  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="rezultati.csv";
  a.click();
}

// ================= INIT =================
render();
updateTimer();

</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
