<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Race Offline PRO</title>
<style>
body { font-family: Arial; padding: 10px; }
button { padding: 8px; margin: 4px; }
input { width: 100px; }
table { border-collapse: collapse; width: 100%; margin-top: 10px; }
td, th { border: 1px solid #ccc; padding: 4px; text-align: center; }
.highlight { background: #c8f7c5; }
</style>
</head>
<body>

<h2>🏃 Race Offline PRO</h2>

<h3 id="timer">00:00</h3>

<button onclick="startRace()">▶️ Start</button>
<button onclick="pauseRace()">⏸ Pauze</button>
<button onclick="stopRace()">🛑 Beigt</button>

<br><br>

<input id="num" placeholder="Nr">
<button onclick="manualAdd()">➕</button>

<button onclick="exportCSV()">📥 Eksports</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th><th>Vārds</th><th>Uzvārds</th><th>Kategorija</th><th>Apļi</th><th>Pēdējais aplis</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let state = JSON.parse(localStorage.getItem("raceData")) || {};
let raceStart = localStorage.getItem("raceStart") || null;
let running = localStorage.getItem("running") === "true";

if (Object.keys(state).length === 0) {
  for (let i = 1; i <= 150; i++) {
    state[i] = {name:"",surname:"",cat:"",laps:0,times:[]};
  }
}

function save() {
  localStorage.setItem("raceData", JSON.stringify(state));
  localStorage.setItem("raceStart", raceStart);
  localStorage.setItem("running", running);
}

// TIMER
function updateTimer() {
  if (!raceStart) return;

  let now = Date.now();
  let diff = Math.floor((now - raceStart)/1000);

  let m = String(Math.floor(diff/60)).padStart(2,'0');
  let s = String(diff%60).padStart(2,'0');

  document.getElementById("timer").innerText = m+":"+s;
}

setInterval(updateTimer, 1000);

function startRace() {
  if (!raceStart) raceStart = Date.now();
  running = true;
  save();
}

function pauseRace() {
  running = false;
  save();
}

function stopRace() {
  running = false;
  raceStart = null;
  save();
}

// RENDER
function render() {
  let t = document.getElementById("table");
  t.innerHTML = "";

  for (let i=1;i<=150;i++) {
    let r = state[i];

    let last = r.times.length ? r.times[r.times.length-1] : "";

    t.innerHTML += `
    <tr id="row-${i}">
      <td>${i}</td>
      <td><input value="${r.name}" onchange="state[${i}].name=this.value;save()"></td>
      <td><input value="${r.surname}" onchange="state[${i}].surname=this.value;save()"></td>
      <td><input value="${r.cat}" onchange="state[${i}].cat=this.value;save()"></td>
      <td id="laps-${i}">${r.laps}</td>
      <td>${last}</td>
    </tr>`;
  }
}

// ADD LAP
function addLap(num) {
  if (!running) return;

  num = num.replace(/\D/g,"");

  if (!state[num]) return;

  let now = Date.now();
  let lapTime = raceStart ? ((now - raceStart)/1000).toFixed(1) : 0;

  state[num].laps++;
  state[num].times.push(lapTime);

  document.getElementById("laps-"+num).innerText = state[num].laps;

  save();
}

// FAST INPUT
function manualAdd() {
  let input = document.getElementById("num");
  addLap(input.value);
  input.value="";
  input.focus();
}

document.getElementById("num").addEventListener("keydown", e=>{
  if (e.key==="Enter") manualAdd();
});

// EXPORT
function exportCSV() {
  let csv="Nr,Vards,Uzvards,Kategorija,Apli,Laiki\n";

  for (let i=1;i<=150;i++) {
    let r=state[i];
    csv += `${i},${r.name},${r.surname},${r.cat},${r.laps},"${r.times.join('|')}"\n`;
  }

  let blob=new Blob([csv],{type:"text/csv"});
  let url=URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="rezultati.csv";
  a.click();
}

render();
updateTimer();

</script>

</body>
</html>
