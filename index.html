<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Race Voice PRO</title>
<style>
body { font-family: Arial; padding: 15px; }
button { padding: 10px 14px; margin: 5px; font-size: 16px; }
table { border-collapse: collapse; width: 100%; margin-top: 15px; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }
input { width: 90%; }
</style>
</head>
<body>

<h2>🏃 Race Voice PRO (1–150)</h2>

<!-- IERAKSTĪT SKAŅU (jaunais variants) -->
<button onclick="startVoice()">🎤 Ierakstīt skaņu</button>

<button onclick="finishProject()">📥 Eksportēt</button>

<br><br>

<input id="manual" placeholder="Numurs (manuāli)">
<button onclick="addLap(document.getElementById('manual').value)">➕ Aplis</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Dz. gads</th>
<th>Apļi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let data = {};

// INIT 1–150
for (let i = 1; i <= 150; i++) {
  data[i] = {
    name: "",
    surname: "",
    year: "",
    laps: 0
  };
}

function render() {
  let t = document.getElementById("table");
  t.innerHTML = "";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];

    t.innerHTML += `
    <tr>
      <td>${i}</td>

      <td><input value="${r.name}" onchange="data[${i}].name=this.value"></td>

      <td><input value="${r.surname}" onchange="data[${i}].surname=this.value"></td>

      <td><input value="${r.year}" onchange="data[${i}].year=this.value"></td>

      <td>${r.laps}</td>
    </tr>`;
  }
}

// PIEVIENO APLI
function addLap(num) {
  if (!num) return;

  num = num.toString().replace(/\D/g,"");

  if (!data[num]) {
    document.getElementById("status").innerText = "Nav atrasts: " + num;
    return;
  }

  data[num].laps++;

  document.getElementById("status").innerText = "Aplis: " + num;

  render();
}

// 🎤 NEPĀRTRAUKTA BALSS SISTĒMA
function startVoice() {
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  rec.lang = "lv-LV";
  rec.continuous = false;
  rec.interimResults = false;

  document.getElementById("status").innerText = "Klausos...";

  rec.start();

  rec.onresult = function(e) {
    let text = e.results[0][0].transcript.toLowerCase();

    // izņem tikai ciparus
    let num = text.replace(/\D/g,"");

    addLap(num);

    // restart (NEPĀRTRAUKTI klausās)
    setTimeout(startVoice, 300);
  };

  rec.onerror = function() {
    setTimeout(startVoice, 1000);
  };
}

// 📥 EXPORT CSV
function finishProject() {
  let csv = "Nr,Vards,Uzvards,DzGads,Apli\n";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];
    csv += `${i},${r.name},${r.surname},${r.year},${r.laps}\n`;
  }

  let blob = new Blob([csv], {type: "text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "rezultati.csv";
  a.click();
}

render();

</script>

</body>
</html>
