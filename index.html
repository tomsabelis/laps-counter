<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Race System PRO</title>
<style>
body { font-family: Arial; padding: 15px; }
button { padding: 8px 12px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 15px; }
td, th { border: 1px solid #ccc; padding: 5px; text-align: center; }
input { width: 90%; }
</style>
</head>
<body>

<h2>🏃 Race System PRO (1–150)</h2>

<button onclick="newProject()">🆕 Jauns projekts</button>
<button onclick="finishProject()">🏁 Pabeigt / Eksportēt</button>

<br><br>

<input id="inputNum" placeholder="Numurs (balss vai manuāli)">
<button onclick="addLap()">➕ Aplis</button>

<p id="status">Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Dzim. gads</th>
<th>Apļi</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let data = {};

function newProject() {
  data = {};

  for (let i = 1; i <= 150; i++) {
    data[i] = {
      name: "",
      surname: "",
      year: "",
      laps: 0
    };
  }

  render();
  document.getElementById("status").innerText = "Jauns projekts izveidots (1–150)";
}

function render() {
  let t = document.getElementById("table");
  t.innerHTML = "";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];

    t.innerHTML += `
    <tr>
      <td>${i}</td>

      <td><input value="${r.name}" onchange="data[${i}].name=this.value"></td>

      <td><input value="${r.surname}" onchange="data[${i}].surname=this.value"></td>

      <td><input value="${r.year}" onchange="data[${i}].year=this.value"></td>

      <td>${r.laps}</td>
    </tr>`;
  }
}

function addLap() {
  let num = document.getElementById("inputNum").value;
  num = num.replace(/\D/g,"");

  if (!data[num]) {
    document.getElementById("status").innerText = "Nav atrasts: " + num;
    return;
  }

  data[num].laps++;
  render();

  document.getElementById("status").innerText = "Aplis pievienots: " + num;
}

// BALSS (LV vai EN)
function startVoice() {
  let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "lv-LV";

  rec.start();
  document.getElementById("status").innerText = "Klausos...";

  rec.onresult = function(e) {
    let text = e.results[0][0].transcript;
    let num = text.replace(/\D/g,"");

    document.getElementById("inputNum").value = num;
    addLap();

    startVoice();
  };
}

// EXPORT CSV
function finishProject() {
  let csv = "Nr,Vards,Uzvards,DzGads,Apli\n";

  for (let i = 1; i <= 150; i++) {
    let r = data[i];

    csv += `${i},${r.name},${r.surname},${r.year},${r.laps}\n`;
  }

  let blob = new Blob([csv], {type: "text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "rezultati.csv";
  a.click();
}

newProject();

</script>

</body>
</html>
