<!DOCTYPE html>
<html lang="lv">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2e7d32">

<title>Veselības Apļi</title>

<style>
body{font-family:Arial;padding:10px}
button{margin:4px;padding:8px}
input,select{width:90px}
table{border-collapse:collapse;width:100%;margin-top:10px}
td,th{border:1px solid #ccc;padding:4px;text-align:center}
.highlight{background:#c8f7c5}
</style>
</head>

<body>

<h2>🏃 Veselības Apļi</h2>

<h3 id="timer">00:00</h3>

<button onclick="startRace()">▶️ Start</button>
<button onclick="stopRace()">🛑 Stop</button>
<button onclick="resetLaps()">🧹 Notīrīt apļus</button>
<button onclick="exportCSV()">📥 Eksports</button>

<br><br>

<input id="num" placeholder="Nr" autofocus>
<button onclick="addLap()">➕ Aplis</button>

<p>Gatavs</p>

<table>
<thead>
<tr>
<th>Nr</th>
<th>Vārds</th>
<th>Uzvārds</th>
<th>Dzimums</th>
<th>Dz.gads</th>
<th>Kategorija</th>
<th>Apļi</th>
<th>Pēdējais laiks</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ================= TIMER =================
let startTime=null;
let running=false;

function updateTimer(){
  if(!startTime) return;
  let d=Math.floor((Date.now()-startTime)/1000);
  document.getElementById("timer").innerText=
    String(Math.floor(d/60)).padStart(2,'0')+":"+String(d%60).padStart(2,'0');
}
setInterval(updateTimer,1000);

// ================= CATEGORY =================
function getCat(y){
  y=parseInt(y);
  if(!y) return "";
  if(y>=2015) return "U10";
  if(y>=2009) return "U16";
  if(y>=1983) return "Adults";
  return "Seniors";
}

// ================= DATA =================
let state=JSON.parse(localStorage.getItem("va"))||{};

if(Object.keys(state).length===0){
  for(let i=1;i<=150;i++){
    state[i]={n:"",s:"",g:"",y:"",l:0,t:[]};
  }
}

function save(){
  localStorage.setItem("va",JSON.stringify(state));
}

// ================= RENDER =================
function render(){
  let t=document.getElementById("table");
  t.innerHTML="";

  for(let i=1;i<=150;i++){
    let r=state[i];

    t.innerHTML+=`
    <tr>
      <td>${i}</td>

      <td><input value="${r.n}" oninput="state[${i}].n=this.value;save()"></td>
      <td><input value="${r.s}" oninput="state[${i}].s=this.value;save()"></td>

      <td>
        <select onchange="state[${i}].g=this.value;save()">
          <option value="">-</option>
          <option value="V" ${r.g=="V"?"selected":""}>V</option>
          <option value="S" ${r.g=="S"?"selected":""}>S</option>
        </select>
      </td>

      <td><input value="${r.y}" oninput="state[${i}].y=this.value;save()"></td>

      <td>${getCat(r.y)}</td>

      <td id="laps-${i}">${r.l}</td>
      <td>${r.t.length?r.t[r.t.length-1]:""}</td>
    </tr>`;
  }
}

// ================= START =================
function startRace(){

  if(!confirm("Sākt jaunu skrējienu? Vecie apļi tiks dzēsti")) return;

  for(let i=1;i<=150;i++){
    state[i].l = 0;
    state[i].t = [];
  }

  startTime=Date.now();
  running=true;

  document.getElementById("timer").innerText="00:00";

  save();
  render();
}

// ================= STOP =================
function stopRace(){
  running=false;
  startTime=null;
  save();
}

// ================= RESET =================
function resetLaps(){

  if(!confirm("Tiešām notīrīt visus apļus?")) return;

  for(let i=1;i<=150;i++){
    state[i].l = 0;
    state[i].t = [];
  }

  startTime=null;
  running=false;

  document.getElementById("timer").innerText="00:00";

  save();
  render();
}

// ================= LAP =================
function addLap(){
  if(!running) return;

  let n=document.getElementById("num").value.replace(/\D/g,"");
  if(!state[n]) return;

  let t=((Date.now()-startTime)/1000).toFixed(1);

  state[n].l++;
  state[n].t.push(t);

  document.getElementById("laps-"+n).innerText=state[n].l;

  document.getElementById("num").value="";
  document.getElementById("num").focus();

  save();
}

document.getElementById("num").addEventListener("keydown",e=>{
  if(e.key==="Enter") addLap();
});

// ================= EXPORT =================
function exportCSV(){

  let arr=[];

  for(let i=1;i<=150;i++){
    let r=state[i];

    arr.push({
      nr:i,
      n:r.n,
      s:r.s,
      g:r.g,
      y:r.y,
      c:getCat(r.y),
      l:r.l,
      last:r.t.length?r.t[r.t.length-1]:"",
      t:r.t.join("|")
    });
  }

  arr.sort((a,b)=>{
    if(a.c!==b.c) return a.c.localeCompare(b.c);
    if(a.g!==b.g) return a.g.localeCompare(b.g);
    return b.l-a.l;
  });

  let csv="Nr,Vards,Uzvards,Dzimums,DzGads,Kategorija,Apli,Pedejais,Laiki\n";

  arr.forEach(r=>{
    csv+=`${r.nr},${r.n},${r.s},${r.g},${r.y},${r.c},${r.l},${r.last},"${r.t}"\n`;
  });

  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Veselibas_Apli.csv";
  a.click();
}

// ================= INIT =================
render();
updateTimer();

</script>

</body>
</html>
