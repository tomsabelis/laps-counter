<script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
// ===== CATEGORY FUNCTION =====
function getCategory(year){
  year = parseInt(year);

  if (!year) return "";

  if (year >= 2015) return "U10";
  if (year >= 2009) return "U16";
  if (year >= 1983) return "Adults";
  if (year <= 1980) return "Seniors";

  return "";
}

// ===== INIT =====
let state = JSON.parse(localStorage.getItem("race")) || {};

if (Object.keys(state).length === 0) {
  for (let i=1;i<=150;i++) {
    state[i]={
      name:"",
      surname:"",
      gender:"",
      year:"",
      cat:"",
      laps:0,
      times:[]
    };
  }
}

// ===== SAVE =====
function save(){
  localStorage.setItem("race",JSON.stringify(state));
}

// ===== RENDER =====
function render(){
  let t=document.getElementById("table");
  t.innerHTML="";

  for(let i=1;i<=150;i++){
    let r=state[i];

    // auto category
    r.cat = getCategory(r.year);

    let last=r.times.length?r.times[r.times.length-1]:"";

    t.innerHTML+=`
    <tr>
      <td>${i}</td>
      <td><input value="${r.name}" onchange="state[${i}].name=this.value;save()"></td>
      <td><input value="${r.surname}" onchange="state[${i}].surname=this.value;save()"></td>
      
      <td>
        <select onchange="state[${i}].gender=this.value;save()">
          <option value="">-</option>
          <option value="V" ${r.gender=="V"?"selected":""}>V</option>
          <option value="S" ${r.gender=="S"?"selected":""}>S</option>
        </select>
      </td>

      <td><input value="${r.year}" onchange="state[${i}].year=this.value;save();render()"></td>

      <td>${r.cat}</td>

      <td id="laps-${i}">${r.laps}</td>
      <td>${last}</td>
    </tr>`;
  }
}

// ===== EXPORT =====
function exportCSV(){

  let rows = [];

  for(let i=1;i<=150;i++){
    let r=state[i];

    rows.push({
      num:i,
      name:r.name,
      surname:r.surname,
      gender:r.gender,
      year:r.year,
      cat:r.cat,
      laps:r.laps,
      times:r.times.join("|")
    });
  }

  // SORT by category + laps DESC
  rows.sort((a,b)=>{
    if(a.cat===b.cat) return b.laps - a.laps;
    return a.cat.localeCompare(b.cat);
  });

  let csv="Nr,Vards,Uzvards,Dzimums,DzGads,Kategorija,Apli,Laiki\n";

  rows.forEach(r=>{
    csv+=`${r.num},${r.name},${r.surname},${r.gender},${r.year},${r.cat},${r.laps},"${r.times}"\n`;
  });

  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="rezultati.csv";
  a.click();
}

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
